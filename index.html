<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>mise en liste</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --ink: #1a1a2e; --paper: #fafaf7; --cream: #fff;
    --border: #e5e7eb; --muted: #888;
    --pink: #f9a8d4; --purple: #c4b5fd; --green: #86efac;
    --blue: #93c5fd; --yellow: #fcd34d; --orange: #fb923c; --cyan: #67e8f9;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--paper); font-family: 'DM Sans', sans-serif; color: var(--ink); min-height: 100vh; }

/* ═══════════════════════════════
LOGIN SCREEN
═══════════════════════════════ */
#login-screen {
display: none; position: fixed; inset: 0; z-index: 300;
background: var(–paper);
align-items: center; justify-content: center; padding: 20px;
}
#login-screen.visible { display: flex; }
.login-card {
background: white; border: 2px solid var(–ink); border-radius: 20px;
padding: 38px 32px; width: 100%; max-width: 360px;
box-shadow: 6px 6px 0 var(–ink);
display: flex; flex-direction: column; gap: 16px;
}
.login-logo { font-family: ‘Playfair Display’, serif; font-size: 26px; font-weight: 900; letter-spacing: -1px; text-align: center; }
.login-sub  { font-family: ‘DM Mono’, monospace; font-size: 12px; color: var(–muted); text-align: center; margin-top: -8px; }
.login-label { font-family: ‘DM Mono’, monospace; font-size: 11px; color: #555; margin-bottom: 5px; display: block; }
.login-input {
width: 100%; border: 2px solid var(–border); border-radius: 10px;
padding: 12px 14px; font-family: ‘DM Mono’, monospace; font-size: 15px;
outline: none; transition: border-color 0.15s; background: var(–paper); color: var(–ink);
}
.login-input:focus { border-color: var(–ink); }
.login-btn {
width: 100%; padding: 13px;
background: linear-gradient(135deg, var(–pink), var(–purple));
border: 2px solid var(–ink); border-radius: 12px;
font-family: ‘Playfair Display’, serif; font-weight: 700; font-size: 16px;
color: var(–ink); cursor: pointer;
box-shadow: 3px 3px 0 var(–ink); transition: all 0.15s;
}
.login-btn:hover { transform: translate(-1px,-1px); box-shadow: 5px 5px 0 var(–ink); }
.login-btn:active { transform: translate(1px,1px); box-shadow: 1px 1px 0 var(–ink); }
.login-error {
font-family: ‘DM Mono’, monospace; font-size: 12px; color: #dc2626;
background: #fef2f2; border: 1px solid #fecaca; border-radius: 8px;
padding: 9px 12px; text-align: center; display: none;
}
.login-error.visible { display: block; }
.login-shake { animation: shake 0.35s ease; }
@keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-6px)} 40%,80%{transform:translateX(6px)} }

/* ═══════════════════════════════
MAIN APP
═══════════════════════════════ */
#app { display: none; padding-bottom: 60px; }
#app.visible { display: block; }

header {
background: var(–cream); border-bottom: 2px solid var(–ink);
padding: 13px 22px; display: flex; align-items: center;
justify-content: space-between; flex-wrap: wrap; gap: 10px;
position: sticky; top: 0; z-index: 100;
}
.logo    { font-family: ‘Playfair Display’, serif; font-size: 21px; font-weight: 900; letter-spacing: -0.5px; }
.tagline { font-family: ‘DM Mono’, monospace; font-size: 10px; color: var(–muted); margin-top: 2px; }
.header-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

.servings-wrap { display: flex; align-items: center; gap: 6px; }
.servings-wrap label { font-family: ‘DM Mono’, monospace; font-size: 12px; color: #555; }
select { border: 2px solid var(–ink); border-radius: 8px; padding: 5px 8px; font-family: ‘DM Mono’, monospace; font-size: 13px; background: white; cursor: pointer; outline: none; }

.hdr-btn {
font-family: ‘DM Mono’, monospace; font-size: 11px; color: var(–muted);
background: none; border: 1.5px solid var(–border); border-radius: 8px;
padding: 5px 10px; cursor: pointer; transition: all 0.12s; white-space: nowrap;
}
.hdr-btn:hover { border-color: var(–ink); color: var(–ink); background: #f5f5f0; }

.container { max-width: 980px; margin: 0 auto; padding: 22px 16px; }
.grid { display: grid; grid-template-columns: 1fr; gap: 26px; }
@media(min-width: 720px) { .grid.has-list { grid-template-columns: 1fr 1fr; } }

.input-card { background: white; border: 2px solid var(–border); border-radius: 16px; padding: 16px; margin-bottom: 13px; }
input[type=text], input[type=url], textarea {
width: 100%; border: 1.5px solid var(–border); border-radius: 10px;
padding: 10px 13px; font-family: ‘DM Sans’, sans-serif; font-size: 14px;
margin-bottom: 9px; outline: none; transition: border-color 0.15s; background: white; color: var(–ink);
}
input[type=text]:focus, input[type=url]:focus, textarea:focus { border-color: var(–ink); }
.input-label { font-family: ‘DM Mono’, monospace; font-size: 11px; color: #555; display: block; margin-bottom: 6px; }
.input-hint  { color: var(–muted); font-size: 10px; }
textarea { font-family: ‘DM Mono’, monospace; font-size: 13px; resize: vertical; min-height: 130px; }
.btn-add { width: 100%; background: var(–ink); color: white; border: none; border-radius: 10px; padding: 11px; font-family: ‘DM Sans’, sans-serif; font-weight: 600; font-size: 14px; cursor: pointer; transition: opacity 0.15s; }
.btn-add:hover { opacity: 0.82; }

.section-title { font-family: ‘Playfair Display’, serif; font-weight: 700; font-size: 15px; margin-bottom: 9px; }
.recipe-list { display: flex; flex-direction: column; gap: 7px; margin-bottom: 15px; }
.recipe-card { background: white; border-radius: 13px; border: 2px solid var(–border); padding: 11px 13px; display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; transition: transform 0.15s; }
.recipe-card:hover { transform: translate(-2px,-2px); }
.recipe-name { font-family: ‘Playfair Display’, serif; font-weight: 700; font-size: 14px; }
.btn-remove  { border-radius: 7px; border: 1.5px solid var(–border); background: #f3f4f6; padding: 3px 9px; font-size: 12px; cursor: pointer; color: #555; white-space: nowrap; flex-shrink: 0; transition: background 0.12s; }
.btn-remove:hover { background: #fee2e2; border-color: #fca5a5; color: #dc2626; }

.actions-row { display: flex; gap: 9px; }
.btn-generate { flex: 1; padding: 13px; background: linear-gradient(135deg, var(–pink), var(–purple)); border: 2px solid var(–ink); border-radius: 13px; font-family: ‘Playfair Display’, serif; font-weight: 700; font-size: 16px; color: var(–ink); cursor: pointer; box-shadow: 4px 4px 0 var(–ink); transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 8px; }
.btn-generate:hover:not(:disabled) { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 var(–ink); }
.btn-generate:active:not(:disabled) { transform: translate(2px,2px); box-shadow: 2px 2px 0 var(–ink); }
.btn-generate:disabled { background: var(–border); border-color: var(–border); box-shadow: none; color: #aaa; cursor: not-allowed; }
.btn-clear { padding: 13px 14px; border: 2px solid var(–border); border-radius: 13px; background: white; cursor: pointer; font-size: 17px; transition: all 0.15s; color: #888; }
.btn-clear:hover { border-color: #fca5a5; color: #dc2626; background: #fef2f2; }

@keyframes spin { to { transform: rotate(360deg); } }
.spinner { display: inline-block; animation: spin 0.9s linear infinite; }
.error-box { margin-top: 10px; color: #dc2626; font-family: ‘DM Mono’, monospace; font-size: 12px; padding: 9px 13px; background: #fef2f2; border-radius: 8px; border: 1px solid #fecaca; }

.list-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; flex-wrap: wrap; gap: 8px; }
.list-title  { font-family: ‘Playfair Display’, serif; font-weight: 700; font-size: 20px; }
.list-meta   { display: flex; align-items: center; gap: 9px; }
.list-count  { font-family: ‘DM Mono’, monospace; font-size: 12px; color: var(–muted); }
.btn-reset-checks { font-family: ‘DM Mono’, monospace; font-size: 11px; color: var(–muted); background: none; border: 1px solid var(–border); border-radius: 6px; padding: 3px 8px; cursor: pointer; transition: all 0.12s; }
.btn-reset-checks:hover { border-color: var(–ink); color: var(–ink); }

.category-block { margin-bottom: 20px; }
.category-heading { font-family: ‘Playfair Display’, serif; font-weight: 700; font-size: 13px; border-bottom: 2.5px solid #ccc; padding-bottom: 5px; margin-bottom: 8px; display: flex; align-items: center; gap: 7px; }
.cat-dot { border-radius: 5px; width: 12px; height: 12px; display: inline-block; flex-shrink: 0; }

.grocery-item { display: flex; align-items: flex-start; gap: 10px; padding: 8px 11px; border-radius: 10px; background: white; border: 1.5px solid var(–border); cursor: pointer; margin-bottom: 5px; transition: opacity 0.15s, background 0.15s; user-select: none; }
.grocery-item.checked { opacity: 0.4; background: #f8f8f8; }
.check-box { width: 18px; height: 18px; border-radius: 5px; border: 2px solid #ccc; flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; font-size: 11px; transition: all 0.12s; background: white; }
.item-name { font-weight: 600; font-size: 14px; line-height: 1.4; }
.grocery-item.checked .item-name { text-decoration: line-through; }
.item-qty  { font-weight: 400; color: #555; margin-left: 7px; font-size: 13px; }
.item-note { font-size: 11px; color: var(–muted); font-family: ‘DM Mono’, monospace; margin-top: 2px; }
.item-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
.item-tag  { border-radius: 10px; padding: 1px 7px; font-size: 10px; font-family: ‘DM Mono’, monospace; color: #555; }

.empty-hint { text-align: center; padding: 36px 20px; color: var(–muted); font-family: ‘DM Mono’, monospace; font-size: 13px; border: 2px dashed var(–border); border-radius: 16px; line-height: 1.8; }
.empty-hint .big { font-size: 30px; display: block; margin-bottom: 8px; }

@keyframes fadeUp { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }
.fade-in { animation: fadeUp 0.3s ease both; }
</style>

</head>

<script>
const KEY_STATE   = 'mel_state_v1';
const KEY_SESSION = 'mel_session';
// New password — old saved password is cleared on load so it cannot be reused
const APP_PASSWORD = 'grocery25';

// ═══════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════
const PASTEL = ['#f9a8d4','#86efac','#93c5fd','#fcd34d','#c4b5fd','#fb923c','#67e8f9'];
const CAT_COLORS = {
  'Produce':'#86efac','Dairy':'#93c5fd','Meat & Seafood':'#fb923c',
  'Bakery':'#fcd34d','Pantry':'#c4b5fd','Frozen':'#67e8f9',
  'Spices & Herbs':'#f9a8d4','Beverages':'#86efac','Other':'#e2e8f0'
};

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;')
                      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ═══════════════════════════════════════════════════
//  APP STATE
// ═══════════════════════════════════════════════════
let recipes = [], groceryItems = [], checkedItems = {};

// ═══════════════════════════════════════════════════
//  AUTH
// ═══════════════════════════════════════════════════
// Wipe any previously saved password so old credentials don't work
localStorage.removeItem('mel_password');

function tryLogin() {
  const val   = document.getElementById('pw-input').value;
  const errEl = document.getElementById('login-error');
  const card  = document.getElementById('login-card');
  if (val === APP_PASSWORD) {
    sessionStorage.setItem(KEY_SESSION, '1');
    document.getElementById('login-screen').classList.remove('visible');
    document.getElementById('app').classList.add('visible');
    errEl.classList.remove('visible');
    loadState();
  } else {
    errEl.classList.add('visible');
    card.classList.remove('login-shake');
    void card.offsetWidth;
    card.classList.add('login-shake');
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
}

function logout() {
  sessionStorage.removeItem(KEY_SESSION);
  document.getElementById('app').classList.remove('visible');
  document.getElementById('login-screen').classList.add('visible');
  document.getElementById('pw-input').value = '';
}

window.addEventListener('DOMContentLoaded', () => {
  if (sessionStorage.getItem(KEY_SESSION) === '1') {
    document.getElementById('login-screen').classList.remove('visible');
    document.getElementById('app').classList.add('visible');
    loadState();
  }
});

// ═══════════════════════════════════════════════════
//  PERSISTENCE
// ═══════════════════════════════════════════════════
function persist() {
  localStorage.setItem(KEY_STATE, JSON.stringify({
    recipes, groceryItems, checkedItems,
    servings: document.getElementById('servings').value
  }));
}

function loadState() {
  try {
    const raw = localStorage.getItem(KEY_STATE);
    if (!raw) return;
    const s = JSON.parse(raw);
    recipes       = s.recipes       || [];
    groceryItems  = s.groceryItems  || [];
    checkedItems  = s.checkedItems  || {};
    if (s.servings) document.getElementById('servings').value = s.servings;
    renderRecipes();
    if (groceryItems.length > 0) renderGroceryList(groceryItems);
  } catch(e) { console.warn('loadState error', e); }
}

// ═══════════════════════════════════════════════════
//  RECIPES
// ═══════════════════════════════════════════════════
function addRecipe() {
  const title  = document.getElementById('title-input').value.trim();
  const manual = document.getElementById('manual-input').value.trim();
  if (!title)  { showInputError('Please enter a recipe name.'); return; }
  if (!manual) { showInputError('Please paste the ingredient list.'); return; }
  const r = { id: Date.now().toString(), title, url:'manual', content: manual };
  document.getElementById('title-input').value  = '';
  document.getElementById('manual-input').value = '';
  hideInputError();
  recipes.push(r);
  renderRecipes();
  persist();
}

function showInputError(msg) {
  const e = document.getElementById('error-box');
  e.textContent = msg; e.style.display = '';
}
function hideInputError() {
  document.getElementById('error-box').style.display = 'none';
}

function removeRecipe(id) {
  recipes = recipes.filter(r => r.id !== id);
  renderRecipes();
  persist();
}

function clearAll() {
  if (!confirm('Clear all recipes and the grocery list?')) return;
  recipes = []; groceryItems = []; checkedItems = {};
  renderRecipes();
  document.getElementById('grocery-output').style.display = 'none';
  document.getElementById('empty-hint').style.display = '';
  document.getElementById('main-grid').classList.remove('has-list');
  persist();
}

function resetChecks() {
  checkedItems = {};
  renderGroceryList(groceryItems);
  persist();
}

function renderRecipes() {
  const list = document.getElementById('recipe-list');
  const wrap = document.getElementById('recipe-list-wrap');
  list.innerHTML = '';
  recipes.forEach((r, i) => {
    const color = PASTEL[i % PASTEL.length];
    const div   = document.createElement('div');
    div.className = 'recipe-card fade-in';
    div.style.cssText = `border-color:${color};box-shadow:4px 4px 0 ${color}66`;
    div.innerHTML = `
      <div style="flex:1;min-width:0">
        <div class="recipe-name">${escHtml(r.title)}</div>
      </div>
      <button class="btn-remove" onclick="removeRecipe('${escHtml(r.id)}')">Remove</button>`;
    list.appendChild(div);
  });
  wrap.style.display = recipes.length ? '' : 'none';
  document.getElementById('recipe-count-label').textContent = `Your Recipes (${recipes.length})`;
  document.getElementById('btn-generate').disabled = recipes.length === 0;
}

// ═══════════════════════════════════════════════════════════════════
//  LOCAL INGREDIENT PARSING ENGINE  (no API key required)
// ═══════════════════════════════════════════════════════════════════

// ── Unit conversion to a common base (ml for volume, g for weight) ──
const UNIT_TO_ML = {
  'tsp':5,'teaspoon':5,'teaspoons':5,
  'tbsp':15,'tablespoon':15,'tablespoons':15,'tb':15,
  'fl oz':30,'fluid ounce':30,'fluid ounces':30,
  'cup':240,'cups':240,'c':240,
  'pt':480,'pint':480,'pints':480,
  'qt':960,'quart':960,'quarts':960,
  'l':1000,'liter':1000,'liters':1000,'litre':1000,'litres':1000,
  'ml':1,'milliliter':1,'milliliters':1,'millilitre':1,'millilitres':1,
};
const UNIT_TO_G = {
  'oz':28,'ounce':28,'ounces':28,
  'lb':454,'lbs':454,'pound':454,'pounds':454,
  'kg':1000,'kilogram':1000,'kilograms':1000,
  'g':1,'gram':1,'grams':1,
};
// Units that stay as-is (counted)
const COUNT_UNITS = new Set([
  'clove','cloves','head','heads','bunch','bunches','stalk','stalks',
  'sprig','sprigs','slice','slices','piece','pieces','can','cans',
  'jar','jars','bottle','bottles','bag','bags','box','boxes',
  'package','packages','pkg','strip','strips','sheet','sheets',
  'ear','ears','loaf','loaves','fillet','fillets','link','links',
  'patty','patties','cube','cubes','scoop','scoops','dash','dashes',
  'pinch','pinches','handful','handfuls',
]);

// Convert a qty+unit to a normalised object {value, unit, base}
function normaliseUnit(qty, unit) {
  const u = unit.toLowerCase().trim();
  if (UNIT_TO_ML[u]) return { value: qty, unit: u, base: 'ml',    baseVal: qty * UNIT_TO_ML[u] };
  if (UNIT_TO_G[u])  return { value: qty, unit: u, base: 'g',     baseVal: qty * UNIT_TO_G[u]  };
  if (COUNT_UNITS.has(u)) return { value: qty, unit: u, base: 'count', baseVal: qty };
  if (u === '')           return { value: qty, unit: '',  base: 'count', baseVal: qty };
  return { value: qty, unit: u, base: 'other', baseVal: qty };
}

// Convert ml total → human-friendly string
function mlToHuman(ml) {
  if (ml >= 960)  return `${+(ml/960).toFixed(1)} qt`;
  if (ml >= 480)  return `${+(ml/480).toFixed(1)} pt`;
  if (ml >= 240)  return `${+(ml/240).toFixed(1)} cup${ml>=480?'s':''}`;
  if (ml >= 15)   return `${+(ml/15).toFixed(1)} tbsp`;
  return `${+(ml/5).toFixed(1)} tsp`;
}
// Convert g total → human-friendly string
function gToHuman(g) {
  if (g >= 454) return `${+(g/454).toFixed(2)} lb`;
  if (g >= 28)  return `${+(g/28).toFixed(1)} oz`;
  return `${g.toFixed(0)} g`;
}

// ── Fraction parser: "1 1/2" → 1.5, "3/4" → 0.75 ──
function parseFraction(s) {
  s = s.trim();
  // unicode fractions
  const UF = {'½':0.5,'⅓':0.333,'⅔':0.667,'¼':0.25,'¾':0.75,'⅕':0.2,'⅖':0.4,'⅗':0.6,'⅘':0.8,'⅙':0.167,'⅚':0.833,'⅛':0.125,'⅜':0.375,'⅝':0.625,'⅞':0.875};
  for (const [k,v] of Object.entries(UF)) s = s.replace(k, ' '+v);
  s = s.trim();
  const mixed = s.match(/^(\d+)\s+(\d+)\/(\d+)$/);
  if (mixed) return parseInt(mixed[1]) + parseInt(mixed[2])/parseInt(mixed[3]);
  const frac  = s.match(/^(\d+)\/(\d+)$/);
  if (frac)  return parseInt(frac[1])/parseInt(frac[2]);
  const num = parseFloat(s);
  return isNaN(num) ? null : num;
}

// ── Parse a single ingredient line ──
// Returns { qty, unit, name, prep, raw }
function parseIngredientLine(line) {
  line = line.trim();
  if (!line || line.length < 2) return null;

  // Strip leading bullet/dash/number markers
  line = line.replace(/^[\-\*•·▪◦‣⁃]\s*/,'').replace(/^\d+[\.\)]\s*/,'').trim();
  if (!line) return null;

  // All known units combined for regex
  const allUnits = [
    ...Object.keys(UNIT_TO_ML), ...Object.keys(UNIT_TO_G), ...COUNT_UNITS
  ].sort((a,b) => b.length - a.length); // longest first
  const unitRx = allUnits.map(u => u.replace(/\./g,'\\.')).join('|');

  // Pattern: [qty] [unit] ingredient [, prep]
  const rx = new RegExp(
    `^([\\d\\s\\/½⅓⅔¼¾⅕⅖⅗⅘⅙⅚⅛⅜⅝⅞]+)?\\s*(${unitRx})\\.?\\s+(.+)$`, 'i'
  );
  let m = line.match(rx);
  let qty = null, unit = '', name = line;

  if (m) {
    qty  = m[1] ? parseFraction(m[1]) : 1;
    unit = m[2].toLowerCase();
    name = m[3];
  } else {
    // Try just a number at the start
    const numRx = /^([\d\s\/½⅓⅔¼¾⅕⅖⅗⅘⅙⅚⅛⅜⅝⅞]+)\s+(.+)$/;
    const nm = line.match(numRx);
    if (nm) {
      const parsed = parseFraction(nm[1]);
      if (parsed !== null) { qty = parsed; name = nm[2]; }
    }
  }

  // Separate prep note after comma or parentheses
  let prep = '';
  const prepMatch = name.match(/^([^,(]+)[,\(](.*)$/);
  if (prepMatch) {
    name = prepMatch[1].trim();
    prep = prepMatch[2].replace(/\)$/,'').trim();
  }

  // Lowercase + clean name
  name = name.toLowerCase()
    .replace(/\bfresh\b|\bfrozen\b|\bdried\b|\bground\b|\bchopped\b|\bdiced\b|\bsliced\b|\bminced\b|\bgrated\b|\bpeeled\b|\bcrushed\b|\bcooked\b|\braw\b|\blarge\b|\bmedium\b|\bsmall\b/gi, '')
    .replace(/\s+/g,' ').trim();

  // Remove trailing 's' for simple plurals to aid matching (garlic → garlic, onions → onion)
  // But be careful not to mangle words like 'asparagus'
  const safeSingular = name.replace(/(?<=[a-z]{3})s\b/g, '');

  return { qty, unit, name: safeSingular || name, prep, raw: line };
}

// ── Category map: ingredient keyword → category ──
const CAT_MAP = [
  ['Produce', ['apple','apricot','artichoke','arugula','asparagus','avocado','banana','basil','bean sprout','beet','bell pepper','bok choy','broccoli','brussels','cabbage','carrot','cauliflower','celery','chard','cherry','chive','cilantro','corn','cucumber','dill','eggplant','endive','fennel','fig','garlic','ginger','grape','grapefruit','green bean','green onion','herb','jalapeño','kale','leek','lemon','lettuce','lime','mango','mint','mushroom','nectarine','onion','orange','oregano','parsley','parsnip','peach','pear','pea','pepper','pineapple','plum','pomegranate','potato','pumpkin','radish','raspberry','rosemary','sage','scallion','shallot','spinach','squash','strawberry','sweet potato','thyme','tomato','turnip','watermelon','yam','zucchini','cucumber','fennel','leek']],
  ['Meat & Seafood', ['beef','brisket','chicken','clam','cod','crab','duck','fish','ground beef','ground turkey','ham','lamb','lobster','mussels','oyster','pork','prawn','ribeye','salmon','sausage','scallop','shrimp','sirloin','steak','tilapia','tuna','turkey','veal','venison','anchovy','bacon','pepperoni','chorizo','pancetta','prosciutto','salami','filet','brisket']],
  ['Dairy', ['butter','buttermilk','cheese','cheddar','cream cheese','cream','egg','feta','gouda','greek yogurt','half and half','heavy cream','mascarpone','milk','mozzarella','parmesan','provolone','ricotta','sour cream','whipped cream','yogurt','brie','goat cheese','kefir','ghee','creme fraiche']],
  ['Bakery', ['bagel','baguette','biscuit','bread','breadcrumb','brioche','bun','ciabatta','cracker','croissant','crouton','english muffin','flatbread','focaccia','lavash','naan','pita','pretzel','roll','sourdough','tortilla','wrap']],
  ['Frozen', ['frozen','ice cream','sorbet','gelato','popsicle','edamame frozen','frozen pea','frozen corn','frozen spinach']],
  ['Beverages', ['beer','broth','cider','coffee','juice','milk','soda','stock','tea','water','wine','sake','kombucha','lemonade','sparkling','mineral water','chicken broth','beef broth','vegetable broth','chicken stock','beef stock']],
  ['Spices & Herbs', ['allspice','anise','bay leaf','black pepper','cardamom','cayenne','chili flake','chili powder','cinnamon','clove','coriander','cumin','curry','fennel seed','garam masala','garlic powder','ginger powder','herbs de provence','italian seasoning','mustard seed','nutmeg','onion powder','oregano','paprika','pepper','red pepper','saffron','salt','seasoning','sesame','star anise','sumac','turmeric','vanilla','white pepper','za\'atar','cajun','old bay','five spice','smoked paprika']],
  ['Pantry', ['almond','baking powder','baking soda','bean','black bean','bread crumb','brown sugar','buckwheat','bulgur','canola oil','capers','cereal','chickpea','chocolate','cocoa','coconut milk','coconut oil','cornstarch','couscous','cracker','flour','honey','hot sauce','kidney bean','ketchup','lentil','maple syrup','marinara','mayonnaise','molasses','mustard','noodle','nut','oat','oil','olive oil','orzo','pasta','peanut butter','pinto bean','powdered sugar','quinoa','raisin','rice','sesame oil','soy sauce','sugar','sunflower oil','tahini','tomato paste','tomato sauce','vegetable oil','vinegar','walnut','white bean','worcestershire','yeast','pecan','cashew','pine nut','almond flour','cornmeal','polenta','barley','farro','panko','breadcrumbs','miso','fish sauce','oyster sauce','hoisin','sriracha','hot sauce','salsa','pickle','olive','canned tomato','diced tomato','crushed tomato','condensed milk','evaporated milk','coconut cream']],
];

function categorise(name) {
  const n = name.toLowerCase();
  for (const [cat, keywords] of CAT_MAP) {
    if (keywords.some(k => n.includes(k))) return cat;
  }
  return 'Other';
}

// ── Smart purchase quantity recommender ──
// Given a total base amount, unit base, and ingredient name, return a human label
function recommendQty(totalBaseVal, base, unit, name, servings) {
  const scale = servings / 2; // recipes typically written for 2; scale accordingly
  const total = totalBaseVal * scale;
  const n = name.toLowerCase();

  if (base === 'ml') {
    const ml = total;
    if (ml <= 15)  return '1 small bottle';
    if (ml <= 60)  return '1 small bottle';
    if (ml <= 240) return '1 cup (8 fl oz)';
    if (ml <= 480) return '1 pint (16 fl oz)';
    if (ml <= 960) return '1 quart (32 fl oz)';
    return `${+(ml/1000).toFixed(1)} L`;
  }
  if (base === 'g') {
    const g = total;
    // Meats / produce by weight
    if (n.includes('flour') || n.includes('sugar') || n.includes('rice') || n.includes('oat') || n.includes('pasta') || n.includes('lentil') || n.includes('bean')) {
      if (g <= 250)  return '1 small bag (½ lb)';
      if (g <= 500)  return '1 bag (1 lb)';
      if (g <= 1000) return '1 bag (2 lb)';
      return `1 bag (${+(g/454).toFixed(1)} lb)`;
    }
    if (g <= 50)  return `${+(g/28).toFixed(1)} oz`;
    if (g <= 250) return `${+(g/28).toFixed(0)} oz`;
    if (g <= 900) return `${+(g/454).toFixed(2)} lb`;
    return `${+(g/454).toFixed(1)} lb`;
  }
  if (base === 'count') {
    const t = Math.ceil(total);
    const u = unit || 'piece';
    // Recommend real purchase amounts for common items
    if (n.includes('egg'))   return t <= 4 ? '½ dozen' : t <= 8 ? '1 dozen' : '2 dozen';
    if (n.includes('garlic')) return t <= 3 ? '1 head' : '2 heads';
    if (n.includes('onion')) return t <= 2 ? '1 bag (3 lb)' : '1 bag (5 lb)';
    if (n.includes('lemon') || n.includes('lime') || n.includes('orange')) return t <= 3 ? `${t}` : '1 bag';
    if (n.includes('tomato')) return t <= 3 ? `${t} tomatoes` : '1 bag (2 lb)';
    if (n.includes('potato') || n.includes('yam')) return t <= 3 ? `${t}` : '1 bag (5 lb)';
    if (n.includes('avocado')) return `${t}`;
    if (n.includes('banana')) return '1 bunch';
    return t === 1 ? `1 ${u}` : `${t} ${u}s`.replace(/ss$/, 's');
  }
  // other/unknown — just show amount as-is
  if (totalBaseVal === null || totalBaseVal === 0) return 'as needed';
  return `${+(totalBaseVal * scale).toFixed(1)} ${unit}`.trim();
}

// ── Normalise ingredient name for deduplication ──
// Strips descriptors so "fresh garlic cloves" and "garlic" both → "garlic"
const NOISE_WORDS = new Set([
  'fresh','dried','frozen','canned','chopped','diced','sliced','minced','grated',
  'shredded','peeled','crushed','ground','cooked','raw','ripe','whole','halved',
  'large','medium','small','extra','about','approximately','plus','optional',
  'to taste','for serving','for garnish','finely','roughly','thinly','thick',
  'divided','room temperature','softened','melted','beaten','sifted','heaping',
  'packed','lightly','firmly','well','thoroughly',
]);

function canonicalise(name) {
  return name.toLowerCase()
    .split(' ')
    .filter(w => !NOISE_WORDS.has(w) && w.length > 1)
    .join(' ')
    .trim();
}

// ── Main local generate function ──
function generateLocal(recipeList, servings) {
  // Map: canonical name → { name, qty entries, usedIn, category }
  const merged = {};

  recipeList.forEach(recipe => {
    const lines = recipe.content.split(/\r?\n/);
    lines.forEach(line => {
      const parsed = parseIngredientLine(line);
      if (!parsed || !parsed.name || parsed.name.length < 2) return;

      const canon = canonicalise(parsed.name);
      if (!canon || canon.length < 2) return;

      if (!merged[canon]) {
        merged[canon] = {
          displayName: parsed.name,
          entries: [],
          usedIn: [],
          category: categorise(parsed.name),
        };
      }
      const entry = merged[canon];
      if (!entry.usedIn.includes(recipe.title)) entry.usedIn.push(recipe.title);
      if (parsed.qty !== null) {
        entry.entries.push(normaliseUnit(parsed.qty, parsed.unit));
      } else {
        entry.entries.push({ value: null, unit: parsed.unit, base: 'other', baseVal: null });
      }
    });
  });

  // Consolidate and build output
  return Object.entries(merged).map(([canon, data]) => {
    // Group entries by base unit type
    const byBase = {};
    data.entries.forEach(e => {
      if (!byBase[e.base]) byBase[e.base] = 0;
      if (e.baseVal !== null) byBase[e.base] += e.baseVal;
    });

    // Pick the dominant base
    let totalBase = 'count', totalVal = 0, totalUnit = '';
    if (byBase['ml']    > 0) { totalBase = 'ml';    totalVal = byBase['ml'];    }
    else if (byBase['g'] > 0) { totalBase = 'g';     totalVal = byBase['g'];     }
    else if (byBase['count'] > 0) { totalBase = 'count'; totalVal = byBase['count']; totalUnit = data.entries.find(e=>e.base==='count')?.unit || ''; }
    else if (byBase['other'] > 0) { totalBase = 'other'; totalVal = byBase['other']; totalUnit = data.entries.find(e=>e.base==='other')?.unit || ''; }

    const qty = recommendQty(totalVal || null, totalBase, totalUnit, data.displayName, parseInt(servings));

    return {
      name: capitalise(data.displayName),
      quantity: qty,
      category: data.category,
      note: '',
      usedIn: data.usedIn,
    };
  }).sort((a,b) => a.name.localeCompare(b.name));
}

function capitalise(s) {
  return s.charAt(0).toUpperCase() + s.slice(1);
}

// ═══════════════════════════════════════════════════
//  GENERATE (local engine, no API required)
// ═══════════════════════════════════════════════════
function generate() {
  const btn    = document.getElementById('btn-generate');
  const errBox = document.getElementById('error-box');
  const servings = document.getElementById('servings').value;
  errBox.style.display = 'none';
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner">⟳</span> Building your list…';

  // Use setTimeout so the spinner renders before we do the work
  setTimeout(() => {
    try {
      // Filter to only manual-entry recipes (URL recipes need their text pasted in)
      const usable = recipes.filter(r => r.url === 'manual' || r.content);
      if (!usable.length) throw new Error('no_content');

      const items = generateLocal(usable, servings);
      if (!items.length) throw new Error('no_items');

      groceryItems = items;
      checkedItems = {};
      renderGroceryList(items);
      persist();
    } catch(e) {
      if (e.message === 'no_content') {
        errBox.textContent = 'Add at least one recipe with ingredients pasted in before generating.';
      } else if (e.message === 'no_items') {
        errBox.textContent = 'No ingredients found — make sure each ingredient is on its own line (e.g. "1 lb ground lamb").';
      } else {
        errBox.textContent = 'Something went wrong. Try formatting ingredients one per line.';
      }
      errBox.style.display = '';
    }
    btn.disabled = recipes.length === 0;
    btn.innerHTML = '✨ Generate Grocery List';
  }, 50);
}

// ═══════════════════════════════════════════════════
//  GROCERY LIST
// ═══════════════════════════════════════════════════
function renderGroceryList(items) {
  const out  = document.getElementById('grocery-output');
  const hint = document.getElementById('empty-hint');
  hint.style.display = 'none';
  out.style.display  = '';
  document.getElementById('main-grid').classList.add('has-list');

  const cats = {};
  items.forEach(item => { const c=item.category||'Other'; if(!cats[c]) cats[c]=[]; cats[c].push(item); });

  const checkedCount = Object.values(checkedItems).filter(Boolean).length;
  out.innerHTML = `
    <div class="list-header fade-in">
      <div class="list-title">🛍️ Shopping List</div>
      <div class="list-meta">
        <div class="list-count">${items.length} items${checkedCount?` · ${checkedCount} checked`:''}</div>
        ${checkedCount>0?`<button class="btn-reset-checks" onclick="resetChecks()">uncheck all</button>`:''}
      </div>
    </div>`;

  Object.entries(cats).forEach(([cat, catItems]) => {
    const color = CAT_COLORS[cat]||'#e2e8f0';
    const block = document.createElement('div');
    block.className = 'category-block fade-in';
    block.innerHTML = `<div class="category-heading" style="border-color:${color}"><span class="cat-dot" style="background:${color}"></span>${escHtml(cat)}</div>`;
    catItems.forEach((item, idx) => {
      const key       = `${cat}||${idx}`;
      const isChecked = !!checkedItems[key];
      const div       = document.createElement('div');
      div.className   = 'grocery-item' + (isChecked ? ' checked' : '');
      const tagsHtml  = (item.usedIn||[]).map((r,ri) => {
        const tc = PASTEL[ri%PASTEL.length];
        return `<span class="item-tag" style="background:${tc}22;border:1px solid ${tc}">${escHtml(r)}</span>`;
      }).join('');
      div.innerHTML = `
        <div class="check-box" style="border-color:${color};${isChecked?'background:'+color:''}">${isChecked?'✓':''}</div>
        <div style="flex:1;min-width:0">
          <div class="item-name">${escHtml(item.name)}<span class="item-qty">${escHtml(item.quantity||'')}</span></div>
          ${item.note?`<div class="item-note">${escHtml(item.note)}</div>`:''}
          ${tagsHtml?`<div class="item-tags">${tagsHtml}</div>`:''}
        </div>`;
      div.addEventListener('click', () => toggleItem(key, color, div, items));
      block.appendChild(div);
    });
    out.appendChild(block);
  });
}

function toggleItem(key, color, div, items) {
  checkedItems[key] = !checkedItems[key];
  const checked = checkedItems[key];
  div.classList.toggle('checked', checked);
  const box = div.querySelector('.check-box');
  box.style.background = checked ? color : 'white';
  box.textContent = checked ? '✓' : '';
  const cnt = Object.values(checkedItems).filter(Boolean).length;
  const countEl = document.querySelector('.list-count');
  if (countEl) countEl.textContent = `${items.length} items${cnt?` · ${cnt} checked`:''}`;
  persist();
}
