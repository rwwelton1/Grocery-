<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>mise en liste — recipe → grocery list</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --ink: #1a1a2e; --paper: #fafaf7; --cream: #ffffff;
    --border: #e5e7eb; --muted: #888;
    --pink: #f9a8d4; --green: #86efac; --blue: #93c5fd;
    --yellow: #fcd34d; --purple: #c4b5fd; --orange: #fb923c; --cyan: #67e8f9;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--paper); font-family: 'DM Sans', sans-serif; color: var(--ink); min-height: 100vh; padding-bottom: 60px; }

header {
background: var(–cream); border-bottom: 2px solid var(–ink);
padding: 16px 28px; display: flex; align-items: center;
justify-content: space-between; flex-wrap: wrap; gap: 10px;
position: sticky; top: 0; z-index: 100;
}
.logo { font-family: ‘Playfair Display’, serif; font-size: 24px; font-weight: 900; letter-spacing: -1px; }
.tagline { font-family: ‘DM Mono’, monospace; font-size: 11px; color: var(–muted); margin-top: 2px; }
.header-right { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }

.sync-pill {
display: flex; align-items: center; gap: 6px;
font-family: ‘DM Mono’, monospace; font-size: 11px;
padding: 5px 10px; border-radius: 20px; border: 1.5px solid var(–border);
background: white; transition: all 0.3s;
}
.sync-dot { width: 7px; height: 7px; border-radius: 50%; background: #d1d5db; transition: background 0.3s; }
.sync-pill.connected .sync-dot { background: #4ade80; box-shadow: 0 0 6px #4ade8088; }
.sync-pill.syncing .sync-dot { background: var(–yellow); animation: pulse 1s infinite; }
.sync-pill.error .sync-dot { background: #f87171; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

.servings-wrap { display: flex; align-items: center; gap: 8px; }
.servings-wrap label { font-family: ‘DM Mono’, monospace; font-size: 12px; color: #555; }
select { border: 2px solid var(–ink); border-radius: 8px; padding: 6px 10px; font-family: ‘DM Mono’, monospace; font-size: 13px; background: white; cursor: pointer; outline: none; }

.container { max-width: 980px; margin: 0 auto; padding: 28px 20px; }
.grid { display: grid; grid-template-columns: 1fr; gap: 32px; }
@media(min-width: 720px) { .grid.has-list { grid-template-columns: 1fr 1fr; } }

.toggle-wrap { display: flex; background: var(–border); border-radius: 12px; padding: 4px; width: fit-content; margin-bottom: 16px; }
.toggle-btn { padding: 7px 16px; border-radius: 9px; border: none; background: transparent; font-family: ‘DM Sans’, sans-serif; font-weight: 600; font-size: 13px; color: var(–muted); cursor: pointer; transition: all 0.15s; }
.toggle-btn.active { background: white; color: var(–ink); box-shadow: 0 1px 4px #0002; }

.input-card { background: white; border: 2px solid var(–border); border-radius: 16px; padding: 18px; margin-bottom: 16px; }
input[type=text], input[type=url], textarea {
width: 100%; border: 1.5px solid var(–border); border-radius: 10px;
padding: 10px 14px; font-family: ‘DM Sans’, sans-serif; font-size: 14px;
margin-bottom: 10px; outline: none; transition: border-color 0.15s; background: white; color: var(–ink);
}
input[type=text]:focus, input[type=url]:focus, textarea:focus { border-color: var(–ink); }
textarea { font-family: ‘DM Mono’, monospace; font-size: 13px; resize: vertical; min-height: 100px; }
.btn-add { width: 100%; background: var(–ink); color: white; border: none; border-radius: 10px; padding: 11px; font-family: ‘DM Sans’, sans-serif; font-weight: 600; font-size: 14px; cursor: pointer; transition: opacity 0.15s; margin-top: 2px; }
.btn-add:hover { opacity: 0.82; }

.section-title { font-family: ‘Playfair Display’, serif; font-weight: 700; font-size: 15px; margin-bottom: 10px; }
.recipe-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 18px; }
.recipe-card { background: white; border-radius: 13px; border: 2px solid var(–border); padding: 12px 14px; display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; transition: transform 0.15s; }
.recipe-card:hover { transform: translate(-2px,-2px); }
.recipe-name { font-family: ‘Playfair Display’, serif; font-weight: 700; font-size: 14px; }
.recipe-url { font-family: ‘DM Mono’, monospace; font-size: 11px; color: var(–muted); word-break: break-all; margin-top: 3px; }
.btn-remove { border-radius: 7px; border: 1.5px solid var(–border); background: #f3f4f6; padding: 3px 9px; font-size: 12px; cursor: pointer; color: #555; white-space: nowrap; flex-shrink: 0; transition: background 0.12s; }
.btn-remove:hover { background: #fee2e2; border-color: #fca5a5; color: #dc2626; }

.actions-row { display: flex; gap: 10px; }
.btn-generate { flex: 1; padding: 14px; background: linear-gradient(135deg, var(–pink), var(–purple)); border: 2px solid var(–ink); border-radius: 14px; font-family: ‘Playfair Display’, serif; font-weight: 700; font-size: 16px; color: var(–ink); cursor: pointer; box-shadow: 4px 4px 0 var(–ink); transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 8px; }
.btn-generate:hover:not(:disabled) { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 var(–ink); }
.btn-generate:active:not(:disabled) { transform: translate(2px,2px); box-shadow: 2px 2px 0 var(–ink); }
.btn-generate:disabled { background: var(–border); border-color: var(–border); box-shadow: none; color: #aaa; cursor: not-allowed; }
.btn-clear { padding: 14px 16px; border: 2px solid var(–border); border-radius: 14px; background: white; cursor: pointer; font-size: 18px; transition: all 0.15s; color: #888; }
.btn-clear:hover { border-color: #fca5a5; color: #dc2626; background: #fef2f2; }

@keyframes spin { to { transform: rotate(360deg); } }
.spinner { display: inline-block; animation: spin 0.9s linear infinite; }
.error-box { margin-top: 10px; color: #dc2626; font-family: ‘DM Mono’, monospace; font-size: 12px; padding: 10px 14px; background: #fef2f2; border-radius: 8px; border: 1px solid #fecaca; }

.list-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; flex-wrap: wrap; gap: 8px; }
.list-title { font-family: ‘Playfair Display’, serif; font-weight: 700; font-size: 20px; }
.list-meta { display: flex; align-items: center; gap: 10px; }
.list-count { font-family: ‘DM Mono’, monospace; font-size: 12px; color: var(–muted); }
.btn-reset-checks { font-family: ‘DM Mono’, monospace; font-size: 11px; color: var(–muted); background: none; border: 1px solid var(–border); border-radius: 6px; padding: 3px 8px; cursor: pointer; transition: all 0.12s; }
.btn-reset-checks:hover { border-color: var(–ink); color: var(–ink); }

.category-block { margin-bottom: 22px; }
.category-heading { font-family: ‘Playfair Display’, serif; font-weight: 700; font-size: 13px; border-bottom: 2.5px solid #ccc; padding-bottom: 5px; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
.cat-dot { border-radius: 5px; width: 13px; height: 13px; display: inline-block; flex-shrink: 0; }

.grocery-item { display: flex; align-items: flex-start; gap: 10px; padding: 8px 12px; border-radius: 10px; background: white; border: 1.5px solid var(–border); cursor: pointer; margin-bottom: 5px; transition: opacity 0.15s, background 0.15s; user-select: none; }
.grocery-item.checked { opacity: 0.42; background: #f8f8f8; }
.check-box { width: 18px; height: 18px; border-radius: 5px; border: 2px solid #ccc; flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; font-size: 11px; transition: all 0.12s; background: white; }
.item-name { font-weight: 600; font-size: 14px; line-height: 1.4; }
.grocery-item.checked .item-name { text-decoration: line-through; }
.item-qty { font-weight: 400; color: #555; margin-left: 7px; font-size: 13px; }
.item-note { font-size: 11px; color: var(–muted); font-family: ‘DM Mono’, monospace; margin-top: 2px; }
.item-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
.item-tag { border-radius: 10px; padding: 1px 7px; font-size: 10px; font-family: ‘DM Mono’, monospace; color: #555; }

.empty-hint { text-align: center; padding: 40px 20px; color: var(–muted); font-family: ‘DM Mono’, monospace; font-size: 13px; border: 2px dashed var(–border); border-radius: 16px; line-height: 1.8; }
.empty-hint .big { font-size: 32px; display: block; margin-bottom: 8px; }

#loading-overlay { position: fixed; inset: 0; background: var(–paper); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; gap: 14px; transition: opacity 0.4s; }
#loading-overlay.hidden { opacity: 0; pointer-events: none; }
.loading-logo { font-family: ‘Playfair Display’, serif; font-size: 28px; font-weight: 900; }
.loading-sub { font-family: ‘DM Mono’, monospace; font-size: 12px; color: var(–muted); }
.loading-bar { width: 140px; height: 3px; background: var(–border); border-radius: 3px; overflow: hidden; }
.loading-bar-inner { height: 100%; width: 40%; background: linear-gradient(90deg, var(–pink), var(–purple)); border-radius: 3px; animation: loadslide 1.2s ease-in-out infinite; }
@keyframes loadslide { 0%{transform:translateX(-100%)} 100%{transform:translateX(350%)} }
@keyframes fadeUp { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }
.fade-in { animation: fadeUp 0.3s ease both; }
</style>

</head>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
  import { getFirestore, doc, onSnapshot, setDoc, updateDoc, getDoc }
    from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

  const app = initializeApp({
    apiKey: "AIzaSyBwnmADttNQIrLBMIwKxJCMwbqhiqQywFc",
    authDomain: "groceries-9a4b7.firebaseapp.com",
    projectId: "groceries-9a4b7",
    storageBucket: "groceries-9a4b7.firebasestorage.app",
    messagingSenderId: "1074319942923",
    appId: "1:1074319942923:web:22ef674e164c453be32e0e",
    measurementId: "G-WMFSK58PBE"
  });
  const db = getFirestore(app);
  const STATE_DOC = doc(db, "shared", "groceryState");

  const PASTEL = ['#f9a8d4','#86efac','#93c5fd','#fcd34d','#c4b5fd','#fb923c','#67e8f9'];
  const CAT_COLORS = {
    'Produce':'#86efac','Dairy':'#93c5fd','Meat & Seafood':'#fb923c',
    'Bakery':'#fcd34d','Pantry':'#c4b5fd','Frozen':'#67e8f9',
    'Spices & Herbs':'#f9a8d4','Beverages':'#86efac','Other':'#e2e8f0'
  };

  let recipes = [];
  let groceryItems = [];
  let checkedItems = {};
  let mode = 'url';
  let suppressSnapshot = false;

  function escHtml(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function setSyncStatus(state, label) {
    document.getElementById('sync-pill').className = 'sync-pill ' + state;
    document.getElementById('sync-label').textContent = label;
  }

  async function saveState(patch) {
    setSyncStatus('syncing', 'saving…');
    try {
      const snap = await getDoc(STATE_DOC);
      if (snap.exists()) {
        await updateDoc(STATE_DOC, patch);
      } else {
        await setDoc(STATE_DOC, { recipes:[], groceryItems:[], checkedItems:{}, servings:'2', ...patch });
      }
      setSyncStatus('connected', 'synced');
    } catch(e) {
      console.error(e);
      setSyncStatus('error', 'save failed');
    }
  }

  // Real-time listener
  onSnapshot(STATE_DOC, (snap) => {
    const overlay = document.getElementById('loading-overlay');
    if (overlay) { overlay.classList.add('hidden'); setTimeout(()=>overlay.remove(), 500); }
    setSyncStatus('connected', 'synced');

    if (!snap.exists()) return;
    if (suppressSnapshot) return;

    const data = snap.data();
    recipes = data.recipes || [];
    groceryItems = data.groceryItems || [];
    checkedItems = data.checkedItems || {};
    if (data.servings) document.getElementById('servings').value = data.servings;

    renderRecipes();
    if (groceryItems.length > 0) {
      renderGroceryList(groceryItems);
    } else {
      document.getElementById('grocery-output').style.display = 'none';
      document.getElementById('empty-hint').style.display = '';
      document.getElementById('main-grid').classList.remove('has-list');
    }
  }, (err) => {
    console.error(err);
    setSyncStatus('error', 'connection error');
    const overlay = document.getElementById('loading-overlay');
    if (overlay) overlay.classList.add('hidden');
  });

  // Expose globals
  window.setMode = function(m) {
    mode = m;
    document.getElementById('btn-mode-url').classList.toggle('active', m==='url');
    document.getElementById('btn-mode-manual').classList.toggle('active', m==='manual');
    document.getElementById('url-section').style.display = m==='url' ? '' : 'none';
    document.getElementById('manual-section').style.display = m==='manual' ? '' : 'none';
  };

  window.saveServings = async function() {
    await saveState({ servings: document.getElementById('servings').value });
  };

  window.addRecipe = async function() {
    const title = document.getElementById('title-input').value.trim();
    let r;
    if (mode === 'url') {
      let url = document.getElementById('url-input').value.trim();
      if (!url) return;
      if (!url.startsWith('http')) url = 'https://' + url;
      r = { id: Date.now().toString(), title: title || url.replace(/https?:\/\/(www\.)?/,'').split('/')[0], url, content: url };
      document.getElementById('url-input').value = '';
    } else {
      const manual = document.getElementById('manual-input').value.trim();
      if (!manual || !title) { alert('Please enter a recipe name and ingredients.'); return; }
      r = { id: Date.now().toString(), title, url: 'manual', content: manual };
      document.getElementById('manual-input').value = '';
    }
    document.getElementById('title-input').value = '';
    recipes.push(r);
    renderRecipes();
    await saveState({ recipes: [...recipes] });
  };

  window.removeRecipe = async function(id) {
    recipes = recipes.filter(r => r.id !== id);
    renderRecipes();
    await saveState({ recipes: [...recipes] });
  };

  window.clearAll = async function() {
    if (!confirm('Clear all recipes and the grocery list?')) return;
    recipes = []; groceryItems = []; checkedItems = {};
    renderRecipes();
    document.getElementById('grocery-output').style.display = 'none';
    document.getElementById('empty-hint').style.display = '';
    document.getElementById('main-grid').classList.remove('has-list');
    await saveState({ recipes:[], groceryItems:[], checkedItems:{} });
  };

  window.resetChecks = async function() {
    checkedItems = {};
    renderGroceryList(groceryItems);
    await saveState({ checkedItems:{} });
  };

  function renderRecipes() {
    const list = document.getElementById('recipe-list');
    const wrap = document.getElementById('recipe-list-wrap');
    list.innerHTML = '';
    recipes.forEach((r, i) => {
      const color = PASTEL[i % PASTEL.length];
      const div = document.createElement('div');
      div.className = 'recipe-card fade-in';
      div.style.cssText = `border-color:${color};box-shadow:4px 4px 0 ${color}66`;
      div.innerHTML = `
        <div style="flex:1;min-width:0">
          <div class="recipe-name">${escHtml(r.title)}</div>
          <div class="recipe-url">${escHtml(r.url==='manual'?'(manual entry)':r.url)}</div>
        </div>
        <button class="btn-remove" onclick="removeRecipe('${escHtml(r.id)}')">Remove</button>`;
      list.appendChild(div);
    });
    wrap.style.display = recipes.length ? '' : 'none';
    document.getElementById('recipe-count-label').textContent = `Your Recipes (${recipes.length})`;
    document.getElementById('btn-generate').disabled = recipes.length === 0;
  }

  window.generate = async function() {
    const btn = document.getElementById('btn-generate');
    const errBox = document.getElementById('error-box');
    const servings = document.getElementById('servings').value;
    errBox.style.display = 'none';
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner">⟳</span> Building your list…';

    const desc = recipes.map((r,i) =>
      `Recipe ${i+1}: "${r.title}"\n${r.url!=='manual'?'URL: '+r.url:'Ingredients:\n'+r.content}`
    ).join('\n\n---\n\n');

    const prompt = `You are a smart grocery shopping assistant. Given these recipes, create a consolidated grocery list for ${servings} people.\n\n${desc}\n\nInstructions:\n- Combine duplicate ingredients\n- Recommend practical purchase quantities/sizes (e.g. "1 bag (5 lb)" not "3 cups flour")\n- Note which recipes each item is used in\n- Categorize into: Produce, Dairy, Meat & Seafood, Bakery, Pantry, Spices & Herbs, Frozen, Beverages, Other\n- Add helpful notes\n- If given URLs, infer likely ingredients from your knowledge\n\nRespond ONLY with a valid JSON array, no markdown, no fences:\n[{"name":"...","quantity":"...","category":"...","note":"...","usedIn":["Recipe title"]}]`;

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1500, messages: [{ role:'user', content: prompt }] })
      });
      const data = await res.json();
      const text = (data.content||[]).map(b=>b.text||'').join('');
      const items = JSON.parse(text.replace(/```json|```/g,'').trim());
      groceryItems = items; checkedItems = {};
      renderGroceryList(items);
      await saveState({ groceryItems: items, checkedItems:{} });
    } catch(e) {
      errBox.textContent = "Couldn't generate the list. Try adding recipe details manually.";
      errBox.style.display = '';
    }
    btn.disabled = recipes.length === 0;
    btn.innerHTML = '✨ Generate Grocery List';
  };

  function renderGroceryList(items) {
    const out = document.getElementById('grocery-output');
    const hint = document.getElementById('empty-hint');
    hint.style.display = 'none';
    out.style.display = '';
    document.getElementById('main-grid').classList.add('has-list');

    const cats = {};
    items.forEach(item => { const c=item.category||'Other'; if(!cats[c]) cats[c]=[]; cats[c].push(item); });

    const checkedCount = Object.values(checkedItems).filter(Boolean).length;
    out.innerHTML = `
      <div class="list-header fade-in">
        <div class="list-title">🛍️ Shopping List</div>
        <div class="list-meta">
          <div class="list-count">${items.length} items${checkedCount?` · ${checkedCount} checked`:''}</div>
          ${checkedCount>0?`<button class="btn-reset-checks" onclick="resetChecks()">uncheck all</button>`:''}
        </div>
      </div>`;

    Object.entries(cats).forEach(([cat, catItems]) => {
      const color = CAT_COLORS[cat]||'#e2e8f0';
      const block = document.createElement('div');
      block.className = 'category-block fade-in';
      block.innerHTML = `<div class="category-heading" style="border-color:${color}"><span class="cat-dot" style="background:${color}"></span>${escHtml(cat)}</div>`;
      catItems.forEach((item, idx) => {
        const key = cat+'||'+idx;
        const isChecked = !!checkedItems[key];
        const div = document.createElement('div');
        div.className = 'grocery-item'+(isChecked?' checked':'');
        const tagsHtml = (item.usedIn||[]).map((r,ri)=>{
          const tc=PASTEL[ri%PASTEL.length];
          return `<span class="item-tag" style="background:${tc}22;border:1px solid ${tc}">${escHtml(r)}</span>`;
        }).join('');
        div.innerHTML = `
          <div class="check-box" style="border-color:${color};${isChecked?'background:'+color:''}">${isChecked?'✓':''}</div>
          <div style="flex:1;min-width:0">
            <div class="item-name">${escHtml(item.name)}<span class="item-qty">${escHtml(item.quantity||'')}</span></div>
            ${item.note?`<div class="item-note">${escHtml(item.note)}</div>`:''}
            ${tagsHtml?`<div class="item-tags">${tagsHtml}</div>`:''}
          </div>`;
        div.addEventListener('click', () => toggleItem(key, color, div, items));
        block.appendChild(div);
      });
      out.appendChild(block);
    });
  }

  async function toggleItem(key, color, div, items) {
    checkedItems[key] = !checkedItems[key];
    const checked = checkedItems[key];
    div.classList.toggle('checked', checked);
    const box = div.querySelector('.check-box');
    box.style.background = checked ? color : 'white';
    box.textContent = checked ? '✓' : '';
    const cnt = Object.values(checkedItems).filter(Boolean).length;
    const countEl = document.querySelector('.list-count');
    if (countEl) countEl.textContent = `${items.length} items${cnt?` · ${cnt} checked`:''}`;
    await saveState({ checkedItems: {...checkedItems} });
  }
</script>
